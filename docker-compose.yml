version: '3.9'

services:
  api:
    build:
      context: .
      target: builder   # Use builder stage for dev (includes devDependencies)
    command: npm run dev
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/taskflow_dev
      NODE_ENV: development
      JWT_SECRET: dev-secret-key-change-in-production-32chars
      JWT_REFRESH_SECRET: dev-refresh-key-change-in-production-32chars
      LOG_LEVEL: debug
    volumes:
      - ./src:/app/src     # Hot reload
      - ./prisma:/app/prisma
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskflow_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
